<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务轮换 · 樱花</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            background: linear-gradient(135deg, #fff0f5, #ffe4f0, #f8e1f0);
            color: #5c2a3a;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 25%, rgba(255, 182, 193, 0.28) 0%, transparent 50%),
                radial-gradient(circle at 75% 35%, rgba(255, 120, 160, 0.22) 0%, transparent 48%),
                radial-gradient(circle at 40% 80%, rgba(255, 200, 220, 0.25) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.4rem;
            color: #e06a9a;
            margin-bottom: 8px;
        }

        .header p {
            color: #c05a8a;
            font-size: 1.1rem;
        }

        .tasks {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .task-card {
            background: rgba(255, 245, 250, 0.96);
            border: 3px solid #ffb3c6;
            border-radius: 24px;
            width: 420px;
            padding: 28px 32px;
            box-shadow: 0 20px 50px rgba(255, 140, 170, 0.25);
            position: relative;
            overflow: hidden;
        }

        .task-card.current {
            border-color: #ff8fab;
            box-shadow: 0 25px 60px rgba(255, 105, 180, 0.35);
        }

        .task-card::before {
            content: "🌸";
            position: absolute;
            font-size: 48px;
            opacity: 0.12;
            top: 20px;
            right: 25px;
        }

        .status {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.98rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .current .status { background: #ffe4f0; color: #d14a7e; }
        .next .status   { background: #f0e6ff; color: #9b6dd6; }

        .name {
            font-size: 1.85rem;
            font-weight: 600;
            color: #5c2a3a;
            margin-bottom: 14px;
            line-height: 1.2;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 1.05rem;
            margin-bottom: 18px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #ffd1e6;
        }

        .info-item:last-child { border-bottom: none; }

        .label { color: #c05a8a; font-weight: 500; }

        .tier {
            font-size: 1.65rem;
            font-weight: 700;
            text-align: center;
            margin: 20px 0 12px;
            padding: 10px 0;
            border-radius: 12px;
        }

        .current .tier { background: #ffe4f0; color: #e06a9a; }
        .next .tier   { background: #f0e6ff; color: #9b6dd6; }

        .time-info {
            text-align: center;
            margin-top: 16px;
            font-size: 1.05rem;
            color: #d14a7e;
            font-weight: 500;
        }

        .countdown {
            font-size: 1.35rem;
            font-weight: 600;
            color: #e06a9a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✦ 任务轮换 ✦</h1>
            <p>当前任务与即将到来</p>
        </div>

        <div class="tasks">
            <!-- 当前任务 -->
            <div class="task-card current">
                <div class="status">● 当前任务</div>
                <div class="name" id="current-name"></div>

                <div class="info">
                    <div class="info-item"><span class="label">星球</span><span id="current-map"></span></div>
                    <div class="info-item"><span class="label">类型</span><span id="current-type"></span></div>
                    <div class="info-item"><span class="label">派系</span><span id="current-faction"></span></div>
                </div>

                <div class="tier">Tier <span id="current-tier"></span></div>
                <div class="time-info">
                    剩余时间 <span id="current-countdown" class="countdown">--:--:--</span>
                </div>
            </div>

            <!-- 下一个任务 -->
            <div class="task-card next">
                <div class="status">即将到来</div>
                <div class="name" id="next-name"></div>

                <div class="info">
                    <div class="info-item"><span class="label">星球</span><span id="next-map"></span></div>
                    <div class="info-item"><span class="label">类型</span><span id="next-type"></span></div>
                    <div class="info-item"><span class="label">派系</span><span id="next-faction"></span></div>
                </div>

                <div class="tier">Tier <span id="next-tier"></span></div>
                <div class="time-info">
                    开始时间 <span id="next-starttime" class="countdown">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const data = {{DATA}}

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN', {
                month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function startCountdown(endTime, elementId) {
            const end = endTime * 1000;
            const timer = setInterval(() => {
                const diff = end - Date.now();
                if (diff <= 0) {
                    document.getElementById(elementId).textContent = "已结束";
                    clearInterval(timer);
                    return;
                }
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById(elementId).textContent =
                    `${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`;
            }, 1000);
        }

        // 自动填充数据
        function render() {
            const c = data.current;
            const n = data.next;

            // 当前任务
            document.getElementById('current-name').textContent = c.name;
            document.getElementById('current-map').textContent = c.map;
            document.getElementById('current-type').textContent = c.type;
            document.getElementById('current-faction').textContent = c.faction;
            document.getElementById('current-tier').textContent = c.tier;

            // 下一个任务
            document.getElementById('next-name').textContent = n.name;
            document.getElementById('next-map').textContent = n.map;
            document.getElementById('next-type').textContent = n.type;
            document.getElementById('next-faction').textContent = n.faction;
            document.getElementById('next-tier').textContent = n.tier;

            // 时间处理
            if (c.end) startCountdown(c.end, 'current-countdown');
            if (n.start) {
                document.getElementById('next-starttime').textContent = formatTime(n.start);
            }
        }

        window.onload = render;
    </script>
</body>
</html>
