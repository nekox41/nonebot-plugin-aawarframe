<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日任务 · 樱花</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            background: linear-gradient(135deg, #fff0f5, #ffe4f0, #f8e1f0);
            color: #5c2a3a;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 25%, rgba(255, 182, 193, 0.28) 0%, transparent 50%),
                radial-gradient(circle at 75% 35%, rgba(255, 120, 160, 0.22) 0%, transparent 48%),
                radial-gradient(circle at 40% 80%, rgba(255, 200, 220, 0.25) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header h1 {
            font-size: 2.45rem;
            color: #e06a9a;
            margin-bottom: 8px;
        }

        .header p {
            color: #c05a8a;
            font-size: 1.15rem;
        }

        .task-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
            gap: 20px;
        }

        .task-item {
            background: rgba(255, 245, 250, 0.96);
            border: 3px solid #ffb3c6;
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 12px 35px rgba(255, 140, 170, 0.18);
            position: relative;
            overflow: hidden;
        }

        .task-item::before {
            content: "🌸";
            position: absolute;
            font-size: 38px;
            opacity: 0.1;
            top: 16px;
            right: 22px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .name {
            font-size: 1.55rem;
            font-weight: 600;
            color: #5c2a3a;
            flex: 1;
        }

        .tier {
            font-size: 1.35rem;
            font-weight: 700;
            padding: 4px 16px;
            border-radius: 9999px;
            min-width: 48px;
            text-align: center;
        }

        /* Tier 样式区分 */
        .tier-null, .tier-F, .tier-E, .tier-D, .tier-C, .tier-B {
            background: #f0e6ff;
            color: #8a6fa8;
        }

        .tier-A {
            background: linear-gradient(90deg, #ffe4b3, #ffd166);
            color: #c76a00;
            box-shadow: 0 0 8px rgba(255, 200, 80, 0.6);
        }

        .tier-S {
            background: linear-gradient(90deg, #ffd1e6, #ff9eb5);
            color: #d14a7e;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 1.02rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .label {
            color: #c05a8a;
            font-size: 0.88rem;
            font-weight: 500;
        }

        .time {
            font-size: 1.08rem;
            color: #d14a7e;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✦ 今日任务 ✦</h1>
            <p>全天任务安排</p>
        </div>

        <div class="task-list" id="task-list">
            <!-- JS 动态生成 -->
        </div>
    </div>

    <script>
        const data = {{DATA}};

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN', {
                hour: '2-digit', minute: '2-digit'
            });
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = '';

            data.forEach(task => {
                const tierClass = task.tier === 'S' ? 'tier-S' :
                                task.tier === 'A' ? 'tier-A' :
                                `tier-${task.tier || 'null'}`;

                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `
                    <div class="task-header">
                        <div class="name">${task.name}</div>
                        <div class="tier ${tierClass}">Tier ${task.tier || '—'}</div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="label">星球</span>
                            <span>${task.map}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">类型</span>
                            <span>${task.type}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">派系</span>
                            <span>${task.faction}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">时间</span>
                            <span class="time">${formatTime(task.start)} — ${formatTime(task.end)}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.onload = renderTasks;
    </script>
</body>
</html>
