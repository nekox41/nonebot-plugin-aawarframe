<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务数据面板 · 樱花</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            background: linear-gradient(135deg, #fff0f5, #ffe4f0, #f8e1f0);
            color: #5c2a3a;
            line-height: 1.6;
            padding: 40px 20px;
            width: 1200px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 25%, rgba(255, 182, 193, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 80% 30%, rgba(255, 120, 160, 0.22) 0%, transparent 50%),
                radial-gradient(circle at 35% 75%, rgba(255, 200, 220, 0.28) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .main-wrapper {
            max-width: 1080px;
            margin: 0 auto;
            background: linear-gradient(175deg, #fff5f8, #ffe9f0);
            border: 3px solid #ffb3c6;
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 30px 70px -20px rgba(255, 105, 180, 0.35);
            position: relative;
            z-index: 1;
        }

        .main-wrapper::before {
            content: "🌸"; position: absolute; top: -22px; right: 40px;
            font-size: 58px; color: #ff9eb5; opacity: 0.25; pointer-events: none;
        }

        .panel-left, .panel-right {
            float: left;
            width: 49%;
        }

        .panel-right { margin-left: 2%; }

        .panel-card {
            background: rgba(255, 245, 250, 0.95);
            border: 2px solid #ffb3c6;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(255, 140, 170, 0.15);
            margin-bottom: 24px;
            position: relative;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #ffe0eb;
            color: #5c2a3a;
        }

        .task-title-row td {
            background: linear-gradient(to right, #ffb3c6, #ff8fab);
            color: #5c2a3a;
            font-weight: 600;
            font-size: 16.5px;
            letter-spacing: 1px;
            padding: 16px 18px;
            text-align: center;
        }

        .factor-title-row td {
            background: #fff0f7;
            color: #e06a9a;
            font-weight: 600;
            font-size: 15.5px;
            letter-spacing: 0.8px;
            padding: 13px 18px;
            text-align: center;
        }

        .cond-name {
            font-weight: 600;
            color: #d14a7e;
            width: 32%;
            vertical-align: top;
        }

        .cond-desc {
            color: #6b3f4f;
            text-align: left;
        }

        .faction-tag {
            display: inline-block;
            background: #ffe4f0;
            color: #d14a7e;
            font-size: 12px;
            padding: 3px 11px;
            border-radius: 30px;
            border: 1px solid #ffb3c6;
            margin-left: 10px;
        }

        .clear { clear: both; }
    </style>
</head>
<body>
    <div class="main-wrapper">

        <!-- 左侧面板：任务条件 -->
        <div class="panel-left">
            <div class="panel-card">
                <table class="data-table">
                    <tbody>
                        {{MISSIONS_ROWS}}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 右侧面板：突变因子 -->
        <div class="panel-right">
            <div class="panel-card">
                <table class="data-table">
                    <tbody>
                        {{VARIABLES_ROWS}}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="clear"></div>
    </div>
</body>
</html>
